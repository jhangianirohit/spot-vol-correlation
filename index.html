<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spot-Vol Beta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #0d1117;
    --bg-elevated: #151b23;
    --bg-input: #1c2333;
    --text-primary: #e5e5e5;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --cyan: #06b6d4;
    --cyan-dim: rgba(6, 182, 212, 0.3);
    --cyan-glow: rgba(6, 182, 212, 0.15);
    --green: #22c55e;
    --red: #ef4444;
    --border: #21262d;
    --border-strong: #30363d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: var(--bg-main);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 12px;
    line-height: 1.5;
    animation: fadeIn 0.4s ease-in;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.app-header {
    padding: 20px 24px 12px;
    border-bottom: 1px solid var(--border);
}

.app-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.app-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 0.04em;
}

/* Tabs */
.tab-nav {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
}

.tab-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
}

.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

.tab-panel { display: none; padding: 20px 24px; max-width: 1800px; }
.tab-panel.active { display: block; animation: fadeIn 0.3s ease; }

/* Container */
.container { max-width: 1800px; }

/* Cards */
.card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 16px;
}

.card:hover { border-color: var(--border-strong); }

/* Section headers */
.section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
}

/* Inputs */
.input-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    align-items: flex-end;
}

.input-group { display: flex; flex-direction: column; gap: 4px; }

.input-group label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.input-group input, .input-group select {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 3px;
    outline: none;
    width: 140px;
}

.input-group input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px var(--cyan-dim);
}

textarea.data-input {
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    padding: 10px 12px;
    border-radius: 3px;
    outline: none;
    width: 100%;
    resize: vertical;
    tab-size: 8;
}

textarea.data-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px var(--cyan-dim);
}

/* Buttons */
.btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 7px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
    border: 1px solid var(--cyan);
    background: transparent;
    color: var(--cyan);
}

.btn:hover { background: var(--cyan); color: #000; }
.btn:active { background: #0891b2; }

.btn-row { display: flex; gap: 8px; margin: 12px 0; }

/* Tables */
.data-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    margin: 8px 0;
}

.data-table th {
    background: var(--bg-elevated);
    color: var(--text-muted);
    text-transform: uppercase;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 8px 10px;
    text-align: right;
    border-bottom: 1px solid var(--border-strong);
    position: sticky;
    top: 0;
}

.data-table th:first-child, .data-table th:nth-child(2) { text-align: left; }

.data-table td {
    padding: 5px 10px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
}

.data-table td:first-child { text-align: left; color: var(--cyan); font-weight: 500; }
.data-table td:nth-child(2) { text-align: left; }

.data-table tr:hover td { background: var(--cyan-glow); }

.val-pos { color: var(--green); }
.val-neg { color: var(--red); }

/* Layout */
.two-col {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 20px;
}

/* Status message */
.status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 3px;
    margin: 8px 0;
    animation: fadeIn 0.2s ease;
}

.status-success { background: rgba(34, 197, 94, 0.1); color: var(--green); border: 1px solid rgba(34, 197, 94, 0.2); }
.status-error { background: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid rgba(239, 68, 68, 0.2); }

/* Footer */
.footer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.04em;
    margin-top: 24px;
}

/* Summary bar */
.summary-bar {
    display: flex;
    gap: 24px;
    margin: 12px 0;
    padding: 10px 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-left: 3px solid var(--cyan);
    border-radius: 4px;
}

.summary-item { text-align: center; }

.summary-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.summary-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-top: 2px;
}
</style>
</head>
<body>

<div class="app-header">
    <div class="app-title">Spot-Vol Correlation</div>

</div>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('single')">Single Pair</button>

</div>

<!-- ═══════════ TAB 1: SINGLE PAIR ═══════════ -->
<div id="tab-single" class="tab-panel active">
    <div class="two-col">

                </div>
                <textarea id="single-data" class="data-input" rows="12">ON	11.88	-2.67

<!-- ═══════════ TAB 2: CROSS DECOMPOSITION ═══════════ -->
<div id="tab-cross" class="tab-panel">
    <div class="two-col">
        <div>
            <div class="card">
                <div class="section-title">All Vols &amp; RRs</div>
                <div style="margin-bottom:6px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.04em;">
                    Positive RR = LHS calls over puts · Paste as quoted
                </div>
                <textarea id="cross-data" class="data-input" rows="24"># USD PAIRS
EURUSD	ON	11.88	-2.67
EURUSD	1W	9.03	-1.63
EURUSD	1M	7.53	-1.03
EURUSD	3M	7.25	-0.66
USDCNH	1M	3.55	-0.25
USDCNH	3M	3.58	-0.30
USDJPY	1M	10.20	0.85
USDJPY	3M	9.80	0.60
GBPUSD	1M	7.10	-0.90
GBPUSD	3M	6.90	-0.55
AUDUSD	1M	10.50	-1.40
AUDUSD	3M	10.20	-1.10
# CROSSES
EURCNH	1M	6.38	-0.65
EURCNH	3M	6.27	-0.33
EURJPY	1M	10.80	-0.45
EURJPY	3M	10.50	-0.30
EURGBP	1M	5.20	-0.25
EURGBP	3M	5.00	-0.15</textarea>
                <div class="btn-row">
                    <button class="btn" onclick="computeCross()">Calculate</button>
                    <button class="btn" onclick="copyEmailReport()">Copy Email Report</button>

</div>

<div class="footer">
    Beta = vol pts per 1% spot move · β ≈ 1.48 × RR / (ATM × √T) · SF=0.5 · Analytical Greeks · Calendar days
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────────────────────────

const TENOR_DAYS = {
    'ON':1,'1D':1,'1W':7,'2W':14,'3W':21,'1M':30,'2M':60,
    '3M':91,'6M':182,'9M':274,'1Y':365,'2Y':730
};
const TENOR_ORDER = ['ON','1D','1W','2W','3W','1M','2M','3M','6M','9M','1Y','2Y'];
const TENOR_RANK = {};
TENOR_ORDER.forEach((t,i) => TENOR_RANK[t] = i);

const BETA_CONST = 1.4826;

// ─────────────────────────────────────────────────────────────────
// Core math
// ─────────────────────────────────────────────────────────────────

function tenorToT(tenor) {
    const d = TENOR_DAYS[tenor.toUpperCase()];
    return d ? d / 365 : null;
}

function impliedBeta(vol, rr, tenor) {
    const T = tenorToT(tenor);
    if (!T || vol === 0) return null;
    return BETA_CONST * rr / (vol * Math.sqrt(T));
}

function fairRR(beta, vol, tenor) {
    const T = tenorToT(tenor);
    if (!T) return null;
    return beta * vol * Math.sqrt(T) / BETA_CONST;
}

function sortTenors(arr) {
    return [...arr].sort((a, b) => (TENOR_RANK[a] || 999) - (TENOR_RANK[b] || 999));
}

// ─────────────────────────────────────────────────────────────────
// Dynamic cross detection — no hardcoded pairs
// ─────────────────────────────────────────────────────────────────

function hasUSD(pair) {
    return pair.startsWith('USD') || pair.endsWith('USD');
}

function getCurrencies(pair) {
    // Returns [lhs, rhs] — each 3 letters
    return [pair.slice(0, 3), pair.slice(3, 6)];
}

function getNonUSDCcy(pair) {
    const [lhs, rhs] = getCurrencies(pair);
    if (lhs === 'USD') return rhs;
    if (rhs === 'USD') return lhs;
    return null;
}

function ccySign(pair, ccy) {
    // For a USD pair containing ccy:
    // Returns the sign such that d(ccy value in USD) = sign × d(pair)
    // If pair = CCYUSD: ccy strengthens → pair goes up → sign = +1
    // If pair = USDCCY: ccy strengthens → pair goes down → sign = -1
    const [lhs, rhs] = getCurrencies(pair);
    if (lhs === ccy && rhs === 'USD') return +1;  // CCYUSD
    if (lhs === 'USD' && rhs === ccy) return -1;  // USDCCY
    return 0;
}

function findUSDPairForCcy(ccy, usdPairs) {
    // Find which USD pair in the data contains this currency
    for (const pair of usdPairs) {
        if (getNonUSDCcy(pair) === ccy) return pair;
    }
    return null;
}

function decomposeCross(crossPair, usdPairs) {
    // Given a cross pair (e.g., CHFJPY) and a list of available USD pairs,
    // returns { pair1, pair2, a, b, combinedSign } or null
    // where d(cross) = a × d(pair1) + b × d(pair2)
    // and σ² = σ₁² + σ₂² + 2ab × ρ × σ₁σ₂
    const [ccy1, ccy2] = getCurrencies(crossPair);
    const pair1 = findUSDPairForCcy(ccy1, usdPairs);
    const pair2 = findUSDPairForCcy(ccy2, usdPairs);
    if (!pair1 || !pair2) return null;

    // d(cross) = d(ccy1 in USD) - d(ccy2 in USD)
    //          = sign1 × d(pair1) - sign2 × d(pair2)
    //          = sign1 × d(pair1) + (-sign2) × d(pair2)
    const sign1 = ccySign(pair1, ccy1);
    const sign2 = ccySign(pair2, ccy2);
    const a = sign1;       // coefficient of d(pair1)
    const b = -sign2;      // coefficient of d(pair2)

    return { pair1, pair2, a, b, combinedSign: a * b };
}

// ─────────────────────────────────────────────────────────────────
// Parsing
// ─────────────────────────────────────────────────────────────────

function parseData(text) {
    const data = {};
    text.split('\n').forEach(line => {
        line = line.trim();
        if (!line || line.startsWith('#')) return;
        const parts = line.replace(/,/g, ' ').replace(/\t/g, ' ').split(/\s+/);
        if (parts.length < 3) return;
        const pair = parts[0].toUpperCase();
        const tenor = parts[1].toUpperCase();
        const vol = parseFloat(parts[2]);
        const rr = parts.length >= 4 ? parseFloat(parts[3]) : null;
        if (isNaN(vol)) return;
        if (!data[pair]) data[pair] = {};
        data[pair][tenor] = { vol, rr: isNaN(rr) ? null : rr };
    });
    return data;
}

// ─────────────────────────────────────────────────────────────────
// Formatting — brighter colors for dark background
// ─────────────────────────────────────────────────────────────────

function fmtSigned(v, dp=2) {
    if (v == null || isNaN(v)) return '—';
    return (v >= 0 ? '+' : '') + v.toFixed(dp);
}

function intensityColor(v, maxAbs=null) {
    if (v == null || isNaN(v) || Math.abs(v) < 0.005) return 'color: #6b7280;';
    const cap = maxAbs || 3.0;
    const intensity = Math.min(Math.abs(v) / cap, 1.0);
    if (v > 0) {
        // Bright green on dark: from #5a9a6b at low to #4ade80 at high
        const r = Math.round(74 - intensity * 10);
        const g = Math.round(154 + intensity * 68);
        const b = Math.round(107 - intensity * 20);
        const bg = `rgba(74, 222, 128, ${0.06 + intensity * 0.18})`;
        return `color: rgb(${r},${g},${b}); background: ${bg}; font-weight: ${intensity > 0.5 ? 600 : 400};`;
    } else {
        // Bright red on dark: from #b87070 at low to #f87171 at high
        const r = Math.round(184 + intensity * 64);
        const g = Math.round(112 - intensity * 50);
        const b = Math.round(112 - intensity * 40);
        const bg = `rgba(248, 113, 113, ${0.06 + intensity * 0.18})`;
        return `color: rgb(${r},${g},${b}); background: ${bg}; font-weight: ${intensity > 0.5 ? 600 : 400};`;
    }
}

function td(val, colored=false, maxAbs=null) {
    if (!colored) return `<td>${val}</td>`;
    const num = parseFloat(String(val).replace('+', ''));
    const style = intensityColor(num, maxAbs);
    return `<td style="${style}">${val}</td>`;
}

// ─────────────────────────────────────────────────────────────────
// Tab 1: Single pair
// ─────────────────────────────────────────────────────────────────

function computeSingle() {
    const text = document.getElementById('single-data').value;
    const pair = document.getElementById('single-pair').value.toUpperCase();
    const lines = text.split('\n');
    const results = [];

    lines.forEach(line => {
        line = line.trim();
        if (!line || line.startsWith('#')) return;
        const parts = line.replace(/,/g,' ').replace(/\t/g,' ').split(/\s+/);
        if (parts.length < 3) return;
        const tenor = parts[0].toUpperCase();
        const vol = parseFloat(parts[1]);
        const rr = parseFloat(parts[2]);
        if (isNaN(vol) || isNaN(rr)) return;
        const beta = impliedBeta(vol, rr, tenor);
        if (beta !== null) {
            results.push({ tenor, vol, rr, beta, rrAtm: rr / vol });
        }
    });

    let html = `<div class="card"><div class="section-title">${pair} — Implied Beta</div>`;
    html += '<table class="data-table"><thead><tr>';
    ['Tenor','Vol %','RR %','Beta','RR/ATM'].forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';

    // Find max absolute beta for scaling
    const maxBeta = Math.max(...results.map(r => Math.abs(r.beta)), 1);
    const maxRR = Math.max(...results.map(r => Math.abs(r.rr)), 0.5);

    results.forEach(r => {
        html += '<tr>';
        html += `<td>${r.tenor}</td>`;
        html += `<td>${r.vol.toFixed(2)}</td>`;
        html += td(fmtSigned(r.rr), true, maxRR);
        html += td(fmtSigned(r.beta), true, maxBeta);
        html += td(fmtSigned(r.rrAtm, 3), true, 0.3);
        html += '</tr>';
    });

    html += '</tbody></table></div>';
    document.getElementById('single-results').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────
// Tab 2: Cross decomposition
// ─────────────────────────────────────────────────────────────────

let lastCrossResults = null;

function computeCross() {
    const data = parseData(document.getElementById('cross-data').value);
    const allPairs = Object.keys(data);

    // Dynamically classify: USD pairs vs crosses
    const usdPairs = allPairs.filter(p => hasUSD(p));
    const crosses = allPairs.filter(p => !hasUSD(p));

    const tenorSet = new Set();
    allPairs.forEach(p => Object.keys(data[p]).forEach(t => tenorSet.add(t)));
    const allTenors = sortTenors([...tenorSet]);

    let html = '';

    // ── USD pair betas ──
    html += '<div class="card"><div class="section-title">USD Pair Betas</div>';
    html += '<table class="data-table"><thead><tr>';
    ['Pair','Tenor','Vol %','RR %','Beta','RR/ATM'].forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';

    const betaRows = [];
    usdPairs.sort().forEach(pair => {
        allTenors.forEach(tenor => {
            const d = data[pair] && data[pair][tenor];
            if (!d || d.rr == null || d.vol <= 0) return;
            const beta = impliedBeta(d.vol, d.rr, tenor);
            if (beta == null) return;
            betaRows.push({ pair, tenor, vol: d.vol, rr: d.rr, beta, rrAtm: d.rr / d.vol });
        });
    });

    const maxBetaUSD = Math.max(...betaRows.map(r => Math.abs(r.beta)), 1);
    const maxRRUSD = Math.max(...betaRows.map(r => Math.abs(r.rr)), 0.5);

    betaRows.forEach(r => {
        html += '<tr>';
        html += `<td>${r.pair}</td><td>${r.tenor}</td>`;
        html += `<td>${r.vol.toFixed(2)}</td>`;
        html += td(fmtSigned(r.rr), true, maxRRUSD);
        html += td(fmtSigned(r.beta), true, maxBetaUSD);
        html += td(fmtSigned(r.rrAtm, 3), true, 0.3);
        html += '</tr>';
    });
    html += '</tbody></table></div>';

    // ── Cross decomposition (dynamic leg detection) ──
    html += '<div class="card"><div class="section-title">Cross Predicted vs Market RR</div>';
    html += '<table class="data-table"><thead><tr>';
    ['Cross','Tenor','Legs','ρ vol','β cross','Pred RR%','Mkt RR%','Residual','ρ skew'].forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';

    const crossResults = [];

    crosses.forEach(cross => {
        const decomp = decomposeCross(cross, usdPairs);
        if (!decomp) return;
        const { pair1, pair2, a, b, combinedSign } = decomp;

        allTenors.forEach(tenor => {
            const dc = data[cross] && data[cross][tenor];
            const d1 = data[pair1] && data[pair1][tenor];
            const d2 = data[pair2] && data[pair2][tenor];
            if (!dc || !d1 || !d2 || d1.rr == null || d2.rr == null) return;

            const s1 = d1.vol / 100, s2 = d2.vol / 100, sc = dc.vol / 100;
            const varCross = sc * sc;
            const cs = combinedSign; // a × b

            // ρ from vols: σ² = σ₁² + σ₂² + 2·cs·ρ·σ₁σ₂
            let rhoVol = (sc*sc - s1*s1 - s2*s2) / (2 * cs * s1 * s2);
            rhoVol = Math.max(-1, Math.min(1, rhoVol));

            // Betas
            const beta1 = impliedBeta(d1.vol, d1.rr, tenor);
            const beta2 = impliedBeta(d2.vol, d2.rr, tenor);
            if (beta1 == null || beta2 == null) return;

            // Vol weights: ∂σ_cross/∂σ_leg
            const volW1 = (s1 + cs * rhoVol * s2) / sc;
            const volW2 = (s2 + cs * rhoVol * s1) / sc;

            // Spot weights: E[d(leg)|d(cross)=1%]
            // Cov(pair1, cross) = a² σ₁² + ab ρ σ₁σ₂ = σ₁² + cs ρ σ₁σ₂ (since a²=1)
            // Cov(pair2, cross) = ab ρ σ₁σ₂ + b² σ₂² = cs ρ σ₁σ₂ + σ₂²
            // Cov(pair1, cross) = a×σ₁² + b×ρσ₁σ₂
            // Cov(pair2, cross) = a×ρσ₁σ₂ + b×σ₂²
            const spotW1 = (a*s1*s1 + b*rhoVol*s1*s2) / varCross;
            const spotW2 = (a*rhoVol*s1*s2 + b*s2*s2) / varCross;

            // Cross beta
            const betaCross = volW1 * beta1 * spotW1 + volW2 * beta2 * spotW2;

            // Predicted RR
            const predRR = fairRR(betaCross, dc.vol, tenor);
            const mktRR = dc.rr;
            const residual = mktRR != null && predRR != null ? mktRR - predRR : null;

            // ── ρ dislocation: what ρ would make predicted = market? ──
            // We solve: fairRR(betaCross(ρ), crossVol, tenor) = mktRR
            // Binary search over ρ
            let rhoSkew = null;
            if (mktRR != null) {
                let lo = -0.999, hi = 0.999;
                for (let iter = 0; iter < 60; iter++) {
                    const mid = (lo + hi) / 2;
                    const vw1 = (s1 + cs * mid * s2) / sc;
                    const vw2 = (s2 + cs * mid * s1) / sc;
                    const varC_mid = s1*s1 + s2*s2 + 2*cs*mid*s1*s2;
                    const sw1 = (a*s1*s1 + b*mid*s1*s2) / varC_mid;
                    const sw2 = (a*mid*s1*s2 + b*s2*s2) / varC_mid;
                    const bc = vw1 * beta1 * sw1 + vw2 * beta2 * sw2;
                    const pr = fairRR(bc, dc.vol, tenor);
                    if (pr < mktRR) hi = mid; else lo = mid;
                }
                rhoSkew = (lo + hi) / 2;
            }

            crossResults.push({
                cross, tenor, pair1, pair2, a, b, rhoVol, rhoSkew, beta1, beta2,
                volW1, volW2, spotW1, spotW2, betaCross, predRR, mktRR, residual
            });

            const rhoDiff = rhoSkew != null ? rhoSkew - rhoVol : null;

            html += '<tr>';
            html += `<td>${cross}</td><td>${tenor}</td>`;
            html += `<td>${pair1} / ${pair2}</td>`;
            html += `<td>${rhoVol.toFixed(2)}</td>`;
            html += td(fmtSigned(betaCross), true, 3);
            html += td(fmtSigned(predRR), true, 2);
            html += td(mktRR != null ? fmtSigned(mktRR) : '—', true, 2);
            html += td(residual != null ? fmtSigned(residual) : '—', true, 0.5);
            html += `<td>${rhoSkew != null ? rhoSkew.toFixed(2) : '—'}</td>`;
            html += '</tr>';
        });
    });

    html += '</tbody></table></div>';

    // ── Residual heatmap ──
    if (crossResults.length > 0) {
        const crossNames = [...new Set(crossResults.map(r => r.cross))];
        const crossTenors = sortTenors([...new Set(crossResults.map(r => r.tenor))]);
        const resMap = {};
        let maxRes = 0;
        crossResults.forEach(r => {
            if (r.residual != null) {
                resMap[r.cross + '|' + r.tenor] = r.residual;
                maxRes = Math.max(maxRes, Math.abs(r.residual));
            }
        });
        if (maxRes < 0.01) maxRes = 0.5;

        html += '<div class="card"><div class="section-title">Residual Heatmap (Market − Predicted RR%)</div>';
        html += '<div style="font-size:10px; color:var(--text-muted); margin-bottom:8px;">Positive (green) = cross RR cheap · Negative (red) = rich</div>';
        html += '<table class="data-table"><thead><tr><th>Cross</th>';
        crossTenors.forEach(t => html += `<th>${t}</th>`);
        html += '</tr></thead><tbody>';
        crossNames.forEach(cross => {
            html += '<tr>';
            html += `<td>${cross}</td>`;
            crossTenors.forEach(tenor => {
                const v = resMap[cross + '|' + tenor];
                html += v != null ? td(fmtSigned(v), true, maxRes) : '<td style="color:#484f58;">—</td>';
            });
            html += '</tr>';
        });
        html += '</tbody></table></div>';

        // ── ρ dislocation heatmap ──
        const rhoMap = {};
        let maxRhoDiff = 0;
        crossResults.forEach(r => {
            if (r.rhoSkew != null) {
                const diff = r.rhoSkew - r.rhoVol;
                rhoMap[r.cross + '|' + r.tenor] = diff;
                maxRhoDiff = Math.max(maxRhoDiff, Math.abs(diff));
            }
        });
        if (maxRhoDiff < 0.01) maxRhoDiff = 0.2;

        html += '<div class="card"><div class="section-title">ρ Dislocation (ρ_skew − ρ_vol)</div>';
        html += '<div style="font-size:10px; color:var(--text-muted); margin-bottom:8px;">How much correlation needs to shift from vol-implied to match market RR</div>';
        html += '<table class="data-table"><thead><tr><th>Cross</th>';
        crossTenors.forEach(t => html += `<th>${t}</th>`);
        html += '</tr></thead><tbody>';
        crossNames.forEach(cross => {
            html += '<tr>';
            html += `<td>${cross}</td>`;
            crossTenors.forEach(tenor => {
                const v = rhoMap[cross + '|' + tenor];
                html += v != null ? td(fmtSigned(v), true, maxRhoDiff) : '<td style="color:#484f58;">—</td>';
            });
            html += '</tr>';
        });
        html += '</tbody></table></div>';
    }

    document.getElementById('cross-results').innerHTML = html;
    lastCrossResults = { betaRows, crossResults };
}

// ─────────────────────────────────────────────────────────────────
// Email report
// ─────────────────────────────────────────────────────────────────

function copyEmailReport() {
    if (!lastCrossResults) {
        computeCross();
    }
    const { betaRows, crossResults } = lastCrossResults;
    const now = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });

    let h = `<div style="font-family: Consolas, Monaco, 'Courier New', monospace; font-size: 12px; color: #1f2937; max-width: 900px;">`;
    h += `<h2 style="font-size: 14px; color: #0d1117; border-bottom: 2px solid #06b6d4; padding-bottom: 6px;">SPOT-VOL CROSS RR DECOMPOSITION</h2>`;
    h += `<p style="color: #6b7280; font-size: 11px;">Generated: ${now} EST</p>`;

    // USD pair betas
    h += `<h3 style="font-size: 12px; margin-top: 16px;">USD PAIR BETAS</h3>`;
    h += `<table style="border-collapse: collapse; width: 100%; font-family: Consolas, monospace; font-size: 11px;">`;
    h += `<tr style="background: #0d1117; color: #e5e5e5;">`;
    ['Pair','Tenor','Vol%','RR%','Beta'].forEach(hd => {
        h += `<th style="padding: 6px 8px; text-align: right; border: 1px solid #d1d5db;">${hd}</th>`;
    });
    h += `</tr>`;
    betaRows.forEach(r => {
        h += `<tr>`;
        h += `<td style="padding: 4px 8px; text-align: left; border: 1px solid #e5e7eb;">${r.pair}</td>`;
        h += `<td style="padding: 4px 8px; text-align: left; border: 1px solid #e5e7eb;">${r.tenor}</td>`;
        h += `<td style="padding: 4px 8px; text-align: right; border: 1px solid #e5e7eb;">${r.vol.toFixed(2)}</td>`;
        const rrC = emailColor(r.rr, 2);
        h += `<td style="padding: 4px 8px; text-align: right; border: 1px solid #e5e7eb; color: ${rrC.color}; background: ${rrC.bg};">${fmtSigned(r.rr)}</td>`;
        const bC = emailColor(r.beta, 3);
        h += `<td style="padding: 4px 8px; text-align: right; border: 1px solid #e5e7eb; color: ${bC.color}; background: ${bC.bg};">${fmtSigned(r.beta)}</td>`;
        h += `</tr>`;
    });
    h += `</table>`;

    // Cross results
    h += `<h3 style="font-size: 12px; margin-top: 16px;">CROSS RR: PREDICTED vs MARKET</h3>`;
    h += `<table style="border-collapse: collapse; width: 100%; font-family: Consolas, monospace; font-size: 11px;">`;
    h += `<tr style="background: #0d1117; color: #e5e5e5;">`;
    ['Cross','Tenor','ρ vol','β cross','Pred RR%','Mkt RR%','Residual','ρ skew'].forEach(hd => {
        h += `<th style="padding: 6px 8px; text-align: right; border: 1px solid #d1d5db;">${hd}</th>`;
    });
    h += `</tr>`;
    crossResults.forEach(r => {
        h += `<tr>`;
        h += `<td style="padding: 4px 8px; text-align: left; border: 1px solid #e5e7eb;">${r.cross}</td>`;
        h += `<td style="padding: 4px 8px; text-align: left; border: 1px solid #e5e7eb;">${r.tenor}</td>`;
        h += `<td style="padding: 4px 8px; text-align: right; border: 1px solid #e5e7eb;">${r.rhoVol.toFixed(2)}</td>`;
        const bcC = emailColor(r.betaCross, 3);
        h += `<td style="padding: 4px 8px; text-align: right; border: 1px solid #e5e7eb; color: ${bcC.color}; background: ${bcC.bg};">${fmtSigned(r.betaCross)}</td>`;
        const prC = emailColor(r.predRR, 2);
        h += `<td style="padding: 4px 8px; text-align: right; border: 1px solid #e5e7eb; color: ${prC.color}; background: ${prC.bg};">${fmtSigned(r.predRR)}</td>`;
        const mkC = emailColor(r.mktRR, 2);
        h += `<td style="padding: 4px 8px; text-align: right; border: 1px solid #e5e7eb; color: ${mkC.color}; background: ${mkC.bg};">${r.mktRR != null ? fmtSigned(r.mktRR) : '—'}</td>`;
        const rsC = emailColor(r.residual, 0.5);
        h += `<td style="padding: 4px 8px; text-align: right; border: 1px solid #e5e7eb; color: ${rsC.color}; background: ${rsC.bg};">${r.residual != null ? fmtSigned(r.residual) : '—'}</td>`;
        h += `<td style="padding: 4px 8px; text-align: right; border: 1px solid #e5e7eb;">${r.rhoSkew != null ? r.rhoSkew.toFixed(2) : '—'}</td>`;
        h += `</tr>`;
    });
    h += `</table>`;

    h += `<p style="color: #9ca3af; font-size: 10px; margin-top: 12px;">Beta = vol pts per 1% spot · SF=0.5 · Calendar days · Analytical Greeks</p>`;
    h += `</div>`;

    // Email intensity color (light theme version)
    function emailColor(v, maxAbs=2) {
        if (v == null || isNaN(v) || Math.abs(v) < 0.005) return { color: '#6b7280', bg: '#ffffff' };
        const intensity = Math.min(Math.abs(v) / maxAbs, 1.0);
        if (v > 0) {
            const r = Math.round(240 - intensity * 80);
            const g = Math.round(255 - intensity * 20);
            const b = Math.round(240 - intensity * 80);
            return { color: '#166534', bg: `rgb(${r},${g},${b})` };
        } else {
            const r = Math.round(255 - intensity * 10);
            const g = Math.round(240 - intensity * 80);
            const b = Math.round(240 - intensity * 80);
            return { color: '#991b1b', bg: `rgb(${r},${g},${b})` };
        }
    }

    // Copy as HTML
    try {
        const blob = new Blob([h], { type: 'text/html' });
        const item = new ClipboardItem({ 'text/html': blob, 'text/plain': new Blob([h], { type: 'text/plain' }) });
        navigator.clipboard.write([item]).then(() => {
            showStatus('cross-status', 'Email report copied to clipboard — paste into Outlook/Gmail', 'success');
        });
    } catch (e) {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = h;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showStatus('cross-status', 'HTML copied (fallback) — paste into email', 'success');
    }
}

function showStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.innerHTML = `<div class="status status-${type}">${msg}</div>`;
    setTimeout(() => el.innerHTML = '', 4000);
}

// ─────────────────────────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────────────────────────

function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
}

// Auto-calculate on load
window.addEventListener('load', () => {
    computeSingle();
    computeCross();
});
